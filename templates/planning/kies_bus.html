<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f3d3e">
<title>Kies je bus · OfficeRoute</title>
<style>
  @font-face{font-family:'Jost';font-style:normal;font-weight:100 900;font-display:swap;src:url("{{ url_for('static', filename='fonts/jost-latin.woff2') }}") format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+2000-206F,U+20AC,U+2122}
  :root{--accent:#0f3d3e;--accent2:#15595a;--gold:#b88a44;--bg:#f3efe8;--ink:#16302d;--muted:#74705f;--soft:#eef3ec;--line:#e6ebe4;--panel:#fff}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Jost',Arial,sans-serif;background:#aeb9b2;color:var(--ink);-webkit-font-smoothing:antialiased;
       display:flex;align-items:center;justify-content:center;min-height:100dvh}
  .phone{width:min(393px,100vw);height:min(852px,100dvh);overflow:hidden;display:flex;flex-direction:column;
         background:linear-gradient(170deg,#0f3d3e,#15595a 60%,#0d3334);color:#fff;box-shadow:0 22px 60px rgba(0,0,0,.32)}
  @media (min-width:430px) and (min-height:760px){ .phone{border-radius:46px} }
  .hd{padding:calc(env(safe-area-inset-top) + 26px) 22px 4px;flex-shrink:0}
  .hd .brand{font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:12.5px;color:#bcdcd2}
  .hd h1{font-size:23px;margin:12px 0 4px;font-weight:700}
  .hd p{margin:0;color:#bcdcd2;font-size:13.5px}
  .list{flex:1;padding:16px 16px 8px;overflow:auto}
  .bus{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.16);
       border-radius:15px;padding:13px 14px;margin-bottom:10px;color:#fff;font:inherit;cursor:pointer;transition:.15s}
  .bus:hover{background:rgba(255,255,255,.13)}
  .bus.sel{border-color:var(--gold);background:rgba(184,138,68,.18)}
  .bus .nm{font-weight:700;font-size:16px;min-width:78px}
  /* Realistisch Nederlands kenteken */
  .plate{display:inline-flex;align-items:stretch;height:32px;border:2px solid #0a0a0a;border-radius:6px;overflow:hidden;
         background:#f3cd00;box-shadow:0 1px 3px rgba(0,0,0,.45);font-family:Arial,'Helvetica Neue',sans-serif}
  .plate .eu{background:#003399;display:flex;flex-direction:column;align-items:center;justify-content:center;width:19px;padding-top:2px}
  .plate .eu .st{font-size:7px;line-height:1;color:#ffcc00}
  .plate .eu .nl{font-size:8.5px;font-weight:700;line-height:1;color:#fff;margin-top:1px;letter-spacing:.02em}
  .plate .pl{display:flex;align-items:center;padding:0 9px;color:#0a0a0a;font-weight:800;font-size:18px;letter-spacing:.12em}
  .bus .chev{margin-left:auto;font-size:20px;color:#8fb3aa}
  .foot{padding:6px 16px calc(env(safe-area-inset-bottom) + 18px);flex-shrink:0}
  .skip{display:block;width:100%;background:transparent;border:1.5px solid rgba(255,255,255,.3);color:#eaf3ee;
        border-radius:13px;padding:13px;font:inherit;font-weight:600;font-size:14.5px;cursor:pointer}
  .skip:hover{background:rgba(255,255,255,.08)}
  .foot .hint{color:#9fc0b7;font-size:11.5px;text-align:center;margin:10px 2px 0}
</style>
</head>
<body>
<div class="phone">
  <div class="hd">
    <div class="brand">OfficeRoute</div>
    <h1>In welke bus rijd je?</h1>
    <p>Kies je voertuig om je route van vandaag te zien.</p>
  </div>
  <form method="post" class="list">
    {% for b in fleet %}
    <button class="bus {{ 'sel' if current==b.id }}" type="submit" name="bus_id" value="{{ b.id }}">
      <span class="nm">{{ b.label }}</span>
      <span class="plate"><span class="eu"><span class="st">★</span><span class="nl">NL</span></span><span class="pl">{{ b.plate }}</span></span>
      <span class="chev">›</span>
    </button>
    {% endfor %}
  </form>
  <form method="post" class="foot">
    <button class="skip" type="submit" name="skip" value="1">Doorgaan zonder buskeuze</button>
    <div class="hint">Geen route vandaag? Ga gewoon door — je kunt later alsnog een bus kiezen via “Ik”.</div>
  </form>
</div>
</body>
</html>
