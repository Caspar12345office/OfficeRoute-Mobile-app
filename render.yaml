services:
  - type: web
    name: officeroute-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 4 --timeout 60 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      # Zelfde DATABASE_URL als de kantoorsoftware (gedeelde PostgreSQL).
      # Zet deze handmatig in het Render-dashboard op de Internal Database URL.
      - key: DATABASE_URL
        sync: false
